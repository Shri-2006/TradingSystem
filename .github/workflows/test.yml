name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          POLYGON_API_KEY: test_key
          ALPACA_API_KEY: test_key
          ALPACA_SECRET_KEY: test_key


#using test keys because github actions doesn't use env files, so the polygon client would crash at improt if we didn't have test keys (for test_backetesting.py)